stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -e .
    - pip install pytest-json-report
  script:
    - pytest tests/ -v --json-report --json-report-file=test-report.json
  artifacts:
    paths:
      - test-report.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t coding-agent-harness .
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
